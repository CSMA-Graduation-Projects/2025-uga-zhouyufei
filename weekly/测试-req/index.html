<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>简易库存管理系统</title>
  <style>
    /* ===== 全局样式 ===== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: #f0f2f5;
      color: #333;
      min-height: 100vh;
    }

    /* ===== 登录页 ===== */
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .login-card {
      background: #fff;
      border-radius: 12px;
      padding: 48px 40px;
      width: 400px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
    }

    .login-card h1 {
      text-align: center;
      font-size: 24px;
      color: #1a1a2e;
      margin-bottom: 8px;
    }

    .login-card .subtitle {
      text-align: center;
      font-size: 14px;
      color: #999;
      margin-bottom: 36px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      color: #555;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      height: 42px;
      border: 1px solid #dcdfe6;
      border-radius: 8px;
      padding: 0 14px;
      font-size: 14px;
      color: #333;
      outline: none;
      transition: border-color 0.2s;
      background: #fff;
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .login-hint {
      background: #f0f7ff;
      border: 1px solid #d6e4ff;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 24px;
      font-size: 13px;
      color: #666;
      line-height: 1.8;
    }

    .login-hint span {
      font-weight: 600;
      color: #667eea;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 42px;
      padding: 0 24px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }

    .btn-primary {
      width: 100%;
      background: #667eea;
      color: #fff;
      font-size: 16px;
      height: 46px;
    }

    .btn-primary:hover {
      background: #5a6fd6;
    }

    .btn-success {
      background: #27ae60;
      color: #fff;
    }

    .btn-success:hover {
      background: #219a52;
    }

    .btn-danger {
      background: #e74c3c;
      color: #fff;
    }

    .btn-danger:hover {
      background: #c0392b;
    }

    .btn-outline {
      background: #fff;
      color: #667eea;
      border: 1px solid #667eea;
    }

    .btn-outline:hover {
      background: #667eea;
      color: #fff;
    }

    .btn-sm {
      height: 34px;
      padding: 0 16px;
      font-size: 13px;
    }

    .login-error {
      color: #e74c3c;
      font-size: 13px;
      text-align: center;
      margin-bottom: 16px;
      display: none;
    }

    .login-error.show {
      display: block;
    }

    /* ===== 主界面 ===== */
    .main-container {
      display: none;
      min-height: 100vh;
    }

    .main-container.active {
      display: block;
    }

    .login-container.hidden {
      display: none;
    }

    /* 顶部导航栏 */
    .topbar {
      background: #fff;
      border-bottom: 1px solid #e8e8e8;
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
    }

    .topbar .logo {
      font-size: 18px;
      font-weight: 600;
      color: #1a1a2e;
    }

    .topbar .user-info {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 14px;
      color: #666;
    }

    .topbar .user-info .role-badge {
      background: #667eea;
      color: #fff;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 12px;
    }

    .topbar .user-info .role-badge.admin {
      background: #e74c3c;
    }

    /* 统计卡片 */
    .stats-bar {
      display: flex;
      gap: 24px;
      padding: 24px 32px;
    }

    .stat-card {
      flex: 1;
      background: #fff;
      border-radius: 10px;
      padding: 20px 24px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .stat-card .stat-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .stat-card .stat-icon.in {
      background: #e8f5e9;
      color: #27ae60;
    }

    .stat-card .stat-icon.out {
      background: #fdecea;
      color: #e74c3c;
    }

    .stat-card .stat-icon.total {
      background: #e3f2fd;
      color: #1976d2;
    }

    .stat-card .stat-label {
      font-size: 13px;
      color: #999;
      margin-bottom: 4px;
    }

    .stat-card .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: #1a1a2e;
    }

    /* 标签页导航 */
    .tab-nav {
      display: flex;
      gap: 0;
      padding: 0 32px;
      border-bottom: 2px solid #e8e8e8;
    }

    .tab-nav .tab-btn {
      padding: 12px 24px;
      font-size: 15px;
      color: #999;
      cursor: pointer;
      border: none;
      background: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
      font-weight: 500;
    }

    .tab-nav .tab-btn:hover {
      color: #667eea;
    }

    .tab-nav .tab-btn.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }

    /* 内容区域 */
    .content-area {
      padding: 24px 32px;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    /* 操作面板 */
    .panel {
      background: #fff;
      border-radius: 10px;
      padding: 28px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }

    .panel h2 {
      font-size: 18px;
      color: #1a1a2e;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid #f0f0f0;
    }

    .form-row {
      display: flex;
      gap: 16px;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .form-row .form-group {
      margin-bottom: 0;
      min-width: 200px;
    }

    .form-row .btn {
      margin-bottom: 0;
    }

    /* 表格 */
    .table-wrap {
      margin-top: 20px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    table thead th {
      background: #fafafa;
      padding: 12px 16px;
      text-align: left;
      font-weight: 600;
      color: #555;
      border-bottom: 1px solid #e8e8e8;
      white-space: nowrap;
    }

    table tbody td {
      padding: 12px 16px;
      border-bottom: 1px solid #f0f0f0;
      color: #333;
    }

    table tbody tr:hover {
      background: #f9f9ff;
    }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
    }

    .badge-in {
      background: #e8f5e9;
      color: #27ae60;
    }

    .badge-out {
      background: #fdecea;
      color: #e74c3c;
    }

    /* 消息提示 */
    .toast {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 14px;
      color: #fff;
      z-index: 1000;
      transition: opacity 0.3s;
      opacity: 0;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
    }

    .toast.success {
      background: #27ae60;
    }

    .toast.error {
      background: #e74c3c;
    }

    .toast.warning {
      background: #f39c12;
    }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #ccc;
    }

    .empty-state .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .empty-state p {
      font-size: 14px;
    }

    /* 搜索框 */
    .search-box {
      display: flex;
      gap: 12px;
    }

    .search-box input {
      flex: 1;
      max-width: 400px;
    }

    /* 响应式 - 仅桌面端 */
    @media (max-width: 768px) {
      .stats-bar {
        flex-direction: column;
        padding: 16px;
      }
      .tab-nav {
        padding: 0 16px;
        overflow-x: auto;
      }
      .tab-nav .tab-btn {
        padding: 12px 16px;
        font-size: 14px;
        white-space: nowrap;
      }
      .content-area {
        padding: 16px;
      }
      .panel {
        padding: 20px;
      }
      .form-row {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

  <!-- ===== 登录页 ===== -->
  <div class="login-container" id="loginPage">
    <div class="login-card">
      <h1>📦 简易库存管理系统</h1>
      <p class="subtitle">请输入账号密码登录</p>

      <div class="login-hint">
        演示账号：<br>
        管理员 → 用户名：<span>admin</span> 密码：<span>123</span><br>
        库管员 → 用户名：<span>user</span> 密码：<span>123</span>
      </div>

      <div class="login-error" id="loginError">用户名或密码错误</div>

      <div class="form-group">
        <label for="username">用户名</label>
        <input type="text" id="username" placeholder="请输入用户名" autocomplete="off">
      </div>
      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" placeholder="请输入密码" autocomplete="off">
      </div>
      <button class="btn btn-primary" onclick="handleLogin()">登 录</button>
    </div>
  </div>

  <!-- ===== 主界面 ===== -->
  <div class="main-container" id="mainPage">
    <!-- 顶部导航 -->
    <div class="topbar">
      <div class="logo">📦 简易库存管理系统</div>
      <div class="user-info">
        <span id="displayUsername">-</span>
        <span class="role-badge" id="displayRole">-</span>
        <button class="btn btn-outline btn-sm" onclick="handleLogout()">退出登录</button>
      </div>
    </div>

    <!-- 统计栏 -->
    <div class="stats-bar">
      <div class="stat-card">
        <div class="stat-icon in">📥</div>
        <div>
          <div class="stat-label">本月入库总量</div>
          <div class="stat-value" id="statIn">0</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon out">📤</div>
        <div>
          <div class="stat-label">本月出库总量</div>
          <div class="stat-value" id="statOut">0</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon total">📊</div>
        <div>
          <div class="stat-label">库存物资种类</div>
          <div class="stat-value" id="statTypes">0</div>
        </div>
      </div>
    </div>

    <!-- 标签页导航 -->
    <div class="tab-nav">
      <button class="tab-btn active" data-tab="tab-stockin" onclick="switchTab('tab-stockin')">📥 入库管理</button>
      <button class="tab-btn" data-tab="tab-stockout" onclick="switchTab('tab-stockout')">📤 出库管理</button>
      <button class="tab-btn" data-tab="tab-query" onclick="switchTab('tab-query')">🔍 库存查询</button>
      <button class="tab-btn" data-tab="tab-list" onclick="switchTab('tab-list')">📋 库存列表</button>
    </div>

    <!-- 内容区域 -->
    <div class="content-area">

      <!-- 入库管理 -->
      <div class="tab-content active" id="tab-stockin">
        <div class="panel">
          <h2>入库管理</h2>
          <div class="form-row">
            <div class="form-group">
              <label for="inName">物资名称</label>
              <input type="text" id="inName" placeholder="请输入物资名称">
            </div>
            <div class="form-group">
              <label for="inQty">入库数量</label>
              <input type="number" id="inQty" placeholder="请输入数量" min="1" value="1">
            </div>
            <button class="btn btn-success" onclick="handleStockIn()">确认入库</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>时间</th>
                  <th>物资名称</th>
                  <th>数量</th>
                  <th>类型</th>
                </tr>
              </thead>
              <tbody id="recentInRecords">
                <tr><td colspan="4"><div class="empty-state"><p>暂无入库记录</p></div></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- 出库管理 -->
      <div class="tab-content" id="tab-stockout">
        <div class="panel">
          <h2>出库管理</h2>
          <div class="form-row">
            <div class="form-group">
              <label for="outName">物资名称</label>
              <select id="outName">
                <option value="">请选择物资</option>
              </select>
            </div>
            <div class="form-group">
              <label for="outQty">出库数量</label>
              <input type="number" id="outQty" placeholder="请输入数量" min="1" value="1">
            </div>
            <button class="btn btn-danger" onclick="handleStockOut()">确认出库</button>
          </div>
          <div id="outStockInfo" style="margin-top:8px;font-size:13px;color:#999;"></div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>时间</th>
                  <th>物资名称</th>
                  <th>数量</th>
                  <th>类型</th>
                </tr>
              </thead>
              <tbody id="recentOutRecords">
                <tr><td colspan="4"><div class="empty-state"><p>暂无出库记录</p></div></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- 库存查询 -->
      <div class="tab-content" id="tab-query">
        <div class="panel">
          <h2>库存查询</h2>
          <div class="search-box">
            <input type="text" id="searchKeyword" class="form-group" placeholder="输入物资名称（支持模糊搜索）" style="width:100%;max-width:400px;" oninput="handleSearch()">
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>物资名称</th>
                  <th>当前库存</th>
                  <th>状态</th>
                </tr>
              </thead>
              <tbody id="searchResults">
                <tr><td colspan="3"><div class="empty-state"><p>输入关键词搜索</p></div></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- 库存列表 -->
      <div class="tab-content" id="tab-list">
        <div class="panel">
          <h2>库存列表</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>物资名称</th>
                  <th>当前库存</th>
                  <th>状态</th>
                </tr>
              </thead>
              <tbody id="inventoryList">
                <tr><td colspan="3"><div class="empty-state"><div class="empty-icon">📭</div><p>库存为空</p></div></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- 消息提示 -->
  <div class="toast" id="toast"></div>

  <script>
    /* ================================================================
     * 简易库存管理系统 - 核心逻辑
     * 技术栈：纯 HTML + CSS + JavaScript，数据存储使用 localStorage
     * ================================================================ */

    // ---------- 常量 ----------
    const STORAGE_KEY_INVENTORY = 'ims_inventory';   // 库存数据 { name: quantity }
    const STORAGE_KEY_RECORDS = 'ims_records';       // 操作记录 [{ id, type, name, quantity, date }]
    const SESSION_KEY_USER = 'ims_currentUser';       // 当前登录用户

    // 预设账号
    const ACCOUNTS = {
      admin: { password: '123', role: '管理员' },
      user:  { password: '123', role: '库管员' }
    };

    // ---------- 数据访问层 ----------

    /** 获取库存对象 */
    function getInventory() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY_INVENTORY)) || {};
      } catch (e) {
        return {};
      }
    }

    /** 保存库存对象 */
    function saveInventory(inventory) {
      localStorage.setItem(STORAGE_KEY_INVENTORY, JSON.stringify(inventory));
    }

    /** 获取操作记录数组 */
    function getRecords() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY_RECORDS)) || [];
      } catch (e) {
        return [];
      }
    }

    /** 保存操作记录数组 */
    function saveRecords(records) {
      localStorage.setItem(STORAGE_KEY_RECORDS, JSON.stringify(records));
    }

    /** 生成唯一 ID */
    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).substr(2, 6);
    }

    /** 获取当前时间的格式化字符串 */
    function getNow() {
      const d = new Date();
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    /** 获取当前月份标识 YYYY-MM */
    function getCurrentMonth() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    }

    // ---------- 业务逻辑 ----------

    /** 执行入库操作 */
    function doStockIn(name, quantity) {
      const inventory = getInventory();
      inventory[name] = (inventory[name] || 0) + quantity;
      saveInventory(inventory);

      const records = getRecords();
      records.push({
        id: generateId(),
        type: 'in',
        name: name,
        quantity: quantity,
        date: getNow()
      });
      saveRecords(records);
    }

    /** 执行出库操作，返回 null 表示成功，返回字符串表示错误信息 */
    function doStockOut(name, quantity) {
      const inventory = getInventory();
      const current = inventory[name] || 0;

      if (quantity > current) {
        return '库存不足：当前库存为 ' + current + '，无法出库 ' + quantity;
      }

      inventory[name] = current - quantity;
      if (inventory[name] <= 0) {
        delete inventory[name];
      }
      saveInventory(inventory);

      const records = getRecords();
      records.push({
        id: generateId(),
        type: 'out',
        name: name,
        quantity: quantity,
        date: getNow()
      });
      saveRecords(records);

      return null; // 成功
    }

    /** 计算本月统计数据 */
    function calcMonthlyStats() {
      const records = getRecords();
      const month = getCurrentMonth();
      let totalIn = 0;
      let totalOut = 0;

      records.forEach(r => {
        if (r.date.startsWith(month)) {
          if (r.type === 'in') totalIn += r.quantity;
          else if (r.type === 'out') totalOut += r.quantity;
        }
      });

      return { totalIn, totalOut };
    }

    // ---------- 登录模块 ----------

    /** 处理登录 */
    function handleLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const errorEl = document.getElementById('loginError');

      if (!username || !password) {
        errorEl.textContent = '请输入用户名和密码';
        errorEl.classList.add('show');
        return;
      }

      const account = ACCOUNTS[username];
      if (!account || account.password !== password) {
        errorEl.textContent = '用户名或密码错误';
        errorEl.classList.add('show');
        return;
      }

      errorEl.classList.remove('show');

      // 保存登录状态到 sessionStorage
      sessionStorage.setItem(SESSION_KEY_USER, JSON.stringify({
        username: username,
        role: account.role
      }));

      // 切换到主界面
      document.getElementById('loginPage').classList.add('hidden');
      document.getElementById('mainPage').classList.add('active');

      // 初始化主界面
      initMainPage(username, account.role);
    }

    /** 退出登录 */
    function handleLogout() {
      sessionStorage.removeItem(SESSION_KEY_USER);
      document.getElementById('loginPage').classList.remove('hidden');
      document.getElementById('mainPage').classList.remove('active');

      // 清空输入
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
      document.getElementById('loginError').classList.remove('show');
    }

    /** 支持回车键登录 */
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        const loginPage = document.getElementById('loginPage');
        if (!loginPage.classList.contains('hidden')) {
          handleLogin();
        }
      }
    });

    // ---------- 主界面初始化 ----------

    let currentUser = null;

    function initMainPage(username, role) {
      currentUser = { username, role };

      document.getElementById('displayUsername').textContent = username;
      const roleBadge = document.getElementById('displayRole');
      roleBadge.textContent = role;
      roleBadge.className = 'role-badge' + (role === '管理员' ? ' admin' : '');

      // 默认显示入库标签页
      switchTab('tab-stockin');
      refreshAllViews();
    }

    // ---------- 标签页切换 ----------

    function switchTab(tabId) {
      // 更新标签按钮状态
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === tabId);
      });
      // 更新内容区域
      document.querySelectorAll('.tab-content').forEach(content => {
        content.classList.toggle('active', content.id === tabId);
      });

      // 切换时刷新相关数据
      if (tabId === 'tab-stockout') refreshOutSelect();
      if (tabId === 'tab-list') refreshInventoryList();
      if (tabId === 'tab-query') {
        document.getElementById('searchKeyword').value = '';
        refreshSearchResults('');
      }
    }

    // ---------- 视图刷新 ----------

    /** 刷新所有统计和列表 */
    function refreshAllViews() {
      refreshStats();
      refreshInRecords();
      refreshOutRecords();
      refreshOutSelect();
      refreshInventoryList();
    }

    /** 刷新月度统计 */
    function refreshStats() {
      const stats = calcMonthlyStats();
      const inventory = getInventory();
      document.getElementById('statIn').textContent = stats.totalIn;
      document.getElementById('statOut').textContent = stats.totalOut;
      document.getElementById('statTypes').textContent = Object.keys(inventory).length;
    }

    /** 刷新入库记录（最近10条） */
    function refreshInRecords() {
      const records = getRecords();
      const inRecords = records.filter(r => r.type === 'in').reverse().slice(0, 10);
      const tbody = document.getElementById('recentInRecords');

      if (inRecords.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4"><div class="empty-state"><p>暂无入库记录</p></div></td></tr>';
        return;
      }

      tbody.innerHTML = inRecords.map(r => `
        <tr>
          <td>${r.date}</td>
          <td>${escapeHtml(r.name)}</td>
          <td>${r.quantity}</td>
          <td><span class="badge badge-in">入库</span></td>
        </tr>
      `).join('');
    }

    /** 刷新出库记录（最近10条） */
    function refreshOutRecords() {
      const records = getRecords();
      const outRecords = records.filter(r => r.type === 'out').reverse().slice(0, 10);
      const tbody = document.getElementById('recentOutRecords');

      if (outRecords.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4"><div class="empty-state"><p>暂无出库记录</p></div></td></tr>';
        return;
      }

      tbody.innerHTML = outRecords.map(r => `
        <tr>
          <td>${r.date}</td>
          <td>${escapeHtml(r.name)}</td>
          <td>${r.quantity}</td>
          <td><span class="badge badge-out">出库</span></td>
        </tr>
      `).join('');
    }

    /** 刷新出库下拉列表（仅显示有库存的物资） */
    function refreshOutSelect() {
      const inventory = getInventory();
      const select = document.getElementById('outName');
      const names = Object.keys(inventory).filter(n => inventory[n] > 0).sort();

      select.innerHTML = '<option value="">请选择物资</option>' +
        names.map(n => `<option value="${escapeHtml(n)}">${escapeHtml(n)}（库存：${inventory[n]}）</option>`).join('');

      // 清除库存信息提示
      document.getElementById('outStockInfo').textContent = '';
      document.getElementById('outQty').value = 1;
    }

    /** 刷新库存列表 */
    function refreshInventoryList() {
      const inventory = getInventory();
      const names = Object.keys(inventory).sort();
      const tbody = document.getElementById('inventoryList');

      if (names.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3"><div class="empty-state"><div class="empty-icon">📭</div><p>库存为空</p></div></td></tr>';
        return;
      }

      tbody.innerHTML = names.map(name => {
        const qty = inventory[name];
        let statusHtml = '';
        if (qty === 0) {
          statusHtml = '<span style="color:#e74c3c;">缺货</span>';
        } else if (qty < 10) {
          statusHtml = '<span style="color:#f39c12;">库存偏低</span>';
        } else {
          statusHtml = '<span style="color:#27ae60;">充足</span>';
        }
        return `
          <tr>
            <td>${escapeHtml(name)}</td>
            <td><strong>${qty}</strong></td>
            <td>${statusHtml}</td>
          </tr>
        `;
      }).join('');
    }

    /** 刷新搜索结果 */
    function refreshSearchResults(keyword) {
      const inventory = getInventory();
      const tbody = document.getElementById('searchResults');

      if (!keyword.trim()) {
        tbody.innerHTML = '<tr><td colspan="3"><div class="empty-state"><p>输入关键词搜索</p></div></td></tr>';
        return;
      }

      const kw = keyword.trim().toLowerCase();
      const matches = Object.keys(inventory)
        .filter(name => name.toLowerCase().includes(kw))
        .sort();

      if (matches.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3"><div class="empty-state"><p>未找到匹配的物资</p></div></td></tr>';
        return;
      }

      tbody.innerHTML = matches.map(name => {
        const qty = inventory[name];
        let statusHtml = qty > 0
          ? '<span style="color:#27ae60;">有库存</span>'
          : '<span style="color:#e74c3c;">缺货</span>';
        return `
          <tr>
            <td>${highlightMatch(name, kw)}</td>
            <td><strong>${qty}</strong></td>
            <td>${statusHtml}</td>
          </tr>
        `;
      }).join('');
    }

    // ---------- 操作处理 ----------

    /** 入库操作 */
    function handleStockIn() {
      const nameEl = document.getElementById('inName');
      const qtyEl = document.getElementById('inQty');
      const name = nameEl.value.trim();
      const qty = parseInt(qtyEl.value, 10);

      // 验证
      if (!name) {
        showToast('请输入物资名称', 'error');
        nameEl.focus();
        return;
      }
      if (isNaN(qty) || qty <= 0) {
        showToast('数量必须大于 0', 'error');
        qtyEl.focus();
        return;
      }

      doStockIn(name, qty);
      showToast(`入库成功：${name} +${qty}`, 'success');

      // 清空输入
      nameEl.value = '';
      qtyEl.value = '1';

      // 刷新视图
      refreshAllViews();
    }

    /** 出库操作 */
    function handleStockOut() {
      const nameEl = document.getElementById('outName');
      const qtyEl = document.getElementById('outQty');
      const name = nameEl.value;
      const qty = parseInt(qtyEl.value, 10);

      if (!name) {
        showToast('请选择物资', 'error');
        return;
      }
      if (isNaN(qty) || qty <= 0) {
        showToast('数量必须大于 0', 'error');
        qtyEl.focus();
        return;
      }

      const err = doStockOut(name, qty);
      if (err) {
        showToast(err, 'error');
        return;
      }

      showToast(`出库成功：${name} -${qty}`, 'success');
      qtyEl.value = '1';

      refreshAllViews();

      // 刷新出库下拉（库存可能已变）
      const inventory = getInventory();
      if (!inventory[name] || inventory[name] <= 0) {
        document.getElementById('outStockInfo').textContent = '';
      }
    }

    /** 选择出库物资时显示当前库存 */
    document.getElementById('outName').addEventListener('change', function() {
      const name = this.value;
      const infoEl = document.getElementById('outStockInfo');
      if (!name) {
        infoEl.textContent = '';
        return;
      }
      const inventory = getInventory();
      infoEl.textContent = `当前库存：${inventory[name] || 0}`;
    });

    /** 搜索输入处理 */
    function handleSearch() {
      const keyword = document.getElementById('searchKeyword').value;
      refreshSearchResults(keyword);
    }

    // ---------- 工具函数 ----------

    /** 显示 Toast 提示 */
    let toastTimer;
    function showToast(message, type) {
      const toast = document.getElementById('toast');
      clearTimeout(toastTimer);
      toast.textContent = message;
      toast.className = `toast ${type} show`;
      toastTimer = setTimeout(() => {
        toast.classList.remove('show');
      }, 2500);
    }

    /** HTML 转义 */
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    /** 高亮匹配文本 */
    function highlightMatch(text, keyword) {
      const escaped = escapeHtml(text);
      const escapedKw = keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const regex = new RegExp(`(${escapedKw})`, 'gi');
      return escaped.replace(regex, '<mark style="background:#fff3cd;padding:1px 4px;border-radius:2px;">$1</mark>');
    }

    // ---------- 启动：检查登录状态 ----------

    (function init() {
      const savedSession = sessionStorage.getItem(SESSION_KEY_USER);
      if (savedSession) {
        try {
          const user = JSON.parse(savedSession);
          document.getElementById('loginPage').classList.add('hidden');
          document.getElementById('mainPage').classList.add('active');
          initMainPage(user.username, user.role);
        } catch (e) {
          sessionStorage.removeItem(SESSION_KEY_USER);
        }
      }
    })();
  </script>

</body>
</html>
