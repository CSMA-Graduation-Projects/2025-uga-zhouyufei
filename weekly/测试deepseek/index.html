<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>简易库存管理系统</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; }
  button { cursor: pointer; font-family: inherit; }
  input, select { font-family: inherit; }

  /* Login */
  .login-wrapper { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .login-card { background: #fff; padding: 40px 36px 32px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); width: 360px; }
  .login-card h1 { text-align: center; font-size: 22px; font-weight: 600; margin-bottom: 28px; color: #1a1a1a; }
  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; font-size: 14px; margin-bottom: 6px; color: #555; }
  .form-group input { width: 100%; padding: 9px 12px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 14px; outline: none; transition: border-color 0.2s; }
  .form-group input:focus { border-color: #4a90d9; }
  .login-card button { width: 100%; padding: 10px; background: #4a90d9; color: #fff; border: none; border-radius: 4px; font-size: 15px; margin-top: 4px; }
  .login-card button:hover { background: #3a7bc8; }
  .login-error { color: #d9534f; font-size: 13px; text-align: center; margin-top: 12px; min-height: 20px; }

  /* Main layout */
  .navbar { background: #fff; border-bottom: 1px solid #e8e8e8; padding: 0 24px; height: 52px; display: flex; align-items: center; justify-content: space-between; }
  .navbar .sys-name { font-size: 17px; font-weight: 600; color: #1a1a1a; }
  .navbar .user-info { display: flex; align-items: center; gap: 14px; font-size: 14px; color: #666; }
  .navbar .logout-btn { padding: 5px 14px; background: #fff; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 13px; color: #666; }
  .navbar .logout-btn:hover { color: #d9534f; border-color: #d9534f; }
  .main-content { max-width: 1100px; margin: 0 auto; padding: 24px 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); padding: 22px 24px; }
  .card h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #1a1a1a; border-bottom: 2px solid #4a90d9; padding-bottom: 8px; display: inline-block; }
  .card .form-row { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 10px; }
  .card .form-row .field { flex: 1; }
  .card .form-row .field label { display: block; font-size: 13px; margin-bottom: 4px; color: #555; }
  .card .form-row .field input, .card .form-row .field select { width: 100%; padding: 7px 10px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 14px; outline: none; }
  .card .form-row .field input:focus, .card .form-row .field select:focus { border-color: #4a90d9; }
  .card .btn { padding: 7px 18px; border: none; border-radius: 4px; font-size: 14px; color: #fff; white-space: nowrap; }
  .card .btn-primary { background: #4a90d9; }
  .card .btn-primary:hover { background: #3a7bc8; }
  .card .msg { font-size: 13px; min-height: 20px; margin-top: 6px; }
  .card .msg.success { color: #5cb85c; }
  .card .msg.error { color: #d9534f; }

  /* Query */
  .search-row { display: flex; gap: 10px; margin-bottom: 14px; }
  .search-row input { flex: 1; padding: 7px 10px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 14px; outline: none; }
  .search-row input:focus { border-color: #4a90d9; }
  .search-row button { padding: 7px 16px; background: #4a90d9; color: #fff; border: none; border-radius: 4px; font-size: 14px; }
  .result-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .result-table th, .result-table td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #f0f0f0; }
  .result-table th { background: #fafafa; font-weight: 600; color: #555; font-size: 13px; }
  .result-table .empty { text-align: center; color: #999; padding: 20px; }

  /* Stats */
  .stat-row { display: flex; gap: 24px; }
  .stat-item { flex: 1; text-align: center; padding: 18px 12px; background: #f7f9fc; border-radius: 6px; }
  .stat-item .stat-num { font-size: 28px; font-weight: 700; color: #4a90d9; }
  .stat-item .stat-label { font-size: 13px; color: #888; margin-top: 4px; }

  @media (max-width: 800px) {
    .main-content { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- 登录页 -->
<div id="loginPage" class="login-wrapper">
  <div class="login-card">
    <h1>简易库存管理系统</h1>
    <div class="form-group">
      <label>用户名</label>
      <input type="text" id="loginUser" placeholder="请输入用户名" autocomplete="off">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="loginPass" placeholder="请输入密码">
    </div>
    <button id="loginBtn">登 录</button>
    <div id="loginError" class="login-error"></div>
  </div>
</div>

<!-- 主界面 -->
<div id="mainPage" style="display:none">
  <nav class="navbar">
    <span class="sys-name">简易库存管理系统</span>
    <div class="user-info">
      <span id="displayUser"></span>
      <button class="logout-btn" id="logoutBtn">退出</button>
    </div>
  </nav>
  <div class="main-content">
    <!-- 入库 -->
    <div class="card">
      <h2>入库</h2>
      <div class="form-row">
        <div class="field">
          <label>物资名称</label>
          <input type="text" id="inName" placeholder="请输入物资名称" maxlength="100">
        </div>
        <div class="field">
          <label>数量</label>
          <input type="number" id="inQty" placeholder="正整数" min="1" max="9999">
        </div>
        <button class="btn btn-primary" id="inBtn" style="align-self:flex-end">确认入库</button>
      </div>
      <div id="inMsg" class="msg"></div>
    </div>

    <!-- 出库 -->
    <div class="card">
      <h2>出库</h2>
      <div class="form-row">
        <div class="field">
          <label>物资名称</label>
          <select id="outName"><option value="">-- 请选择 --</option></select>
        </div>
        <div class="field">
          <label>数量</label>
          <input type="number" id="outQty" placeholder="正整数" min="1" max="9999">
        </div>
        <button class="btn btn-primary" id="outBtn" style="align-self:flex-end">确认出库</button>
      </div>
      <div id="outMsg" class="msg"></div>
    </div>

    <!-- 库存查询 -->
    <div class="card">
      <h2>库存查询</h2>
      <div class="search-row">
        <input type="text" id="searchInput" placeholder="输入物资名称模糊搜索">
        <button id="searchBtn">查询</button>
      </div>
      <table class="result-table">
        <thead><tr><th>物资名称</th><th>当前库存</th></tr></thead>
        <tbody id="searchResult"></tbody>
      </table>
    </div>

    <!-- 数据统计 -->
    <div class="card">
      <h2>本月统计</h2>
      <div class="stat-row">
        <div class="stat-item">
          <div class="stat-num" id="statIn">0</div>
          <div class="stat-label">本月入库总量</div>
        </div>
        <div class="stat-item">
          <div class="stat-num" id="statOut">0</div>
          <div class="stat-label">本月出库总量</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ========== 数据层 ==========
const ACCOUNTS = { admin: '123', user: '123' };

function load(key) {
  try { return JSON.parse(localStorage.getItem(key)); } catch (e) { return null; }
}

function save(key, data) {
  localStorage.setItem(key, JSON.stringify(data));
}

function getInventory()  { return load('inventory')  || {}; }
function getInLogs()     { return load('inLogs')     || []; }
function getOutLogs()    { return load('outLogs')    || []; }

function setInventory(v) { save('inventory', v); }
function setInLogs(v)    { save('inLogs', v);    }
function setOutLogs(v)   { save('outLogs', v);   }

// ========== 工具函数 ==========
function now() { return new Date().toISOString(); }
function currentMonth() { const d = new Date(); return d.getMonth() + 1; }
function currentYear()  { return new Date().getFullYear(); }

function isCurrentMonth(ts) {
  const d = new Date(ts);
  return d.getFullYear() === currentYear() && d.getMonth() + 1 === currentMonth();
}

function showMsg(el, text, cls) {
  el.textContent = text;
  el.className = 'msg ' + cls;
  setTimeout(function () { el.textContent = ''; el.className = 'msg'; }, 3000);
}

function clearInputs(ids) {
  ids.forEach(function (id) { document.getElementById(id).value = ''; });
}

// ========== 登录模块 ==========
var loginPage = document.getElementById('loginPage');
var mainPage  = document.getElementById('mainPage');
var loginUserInput = document.getElementById('loginUser');
var loginPassInput = document.getElementById('loginPass');
var loginErrorEl   = document.getElementById('loginError');

function tryLogin() {
  var u = loginUserInput.value.trim();
  var p = loginPassInput.value;
  if (!u || !p) { loginErrorEl.textContent = '请输入用户名和密码'; return; }
  if (ACCOUNTS[u] === p) {
    save('currentUser', u);
    showMain(u);
  } else {
    loginErrorEl.textContent = '用户名或密码错误';
    loginPassInput.value = '';
  }
}

function doLogout() {
  localStorage.removeItem('currentUser');
  loginPage.style.display = 'flex';
  mainPage.style.display  = 'none';
  loginUserInput.value = '';
  loginPassInput.value = '';
  loginErrorEl.textContent = '';
}

// ========== 主界面 ==========
function showMain(user) {
  loginPage.style.display = 'none';
  mainPage.style.display  = 'block';
  document.getElementById('displayUser').textContent = user;
  refreshAll();
}

function refreshAll() {
  refreshOutSelector();
  refreshSearch();
  refreshStats();
}

// ========== 入库模块 ==========
var inName = document.getElementById('inName');
var inQty  = document.getElementById('inQty');
var inMsg  = document.getElementById('inMsg');

function doInbound() {
  var name = inName.value.trim();
  var qty  = parseInt(inQty.value, 10);
  if (!name)            { showMsg(inMsg, '请输入物资名称', 'error'); return; }
  if (name.length > 100){ showMsg(inMsg, '物资名称不超过100字符', 'error'); return; }
  if (isNaN(qty) || qty < 1 || qty > 9999) { showMsg(inMsg, '数量须为1~9999的正整数', 'error'); return; }

  var inv = getInventory();
  inv[name] = (inv[name] || 0) + qty;
  setInventory(inv);

  var logs = getInLogs();
  logs.push({ name: name, quantity: qty, time: now(), operator: getCurrentUser() });
  setInLogs(logs);

  showMsg(inMsg, '入库成功：' + name + ' +' + qty, 'success');
  clearInputs(['inName', 'inQty']);
  refreshAll();
}

// ========== 出库模块 ==========
var outName = document.getElementById('outName');
var outQty  = document.getElementById('outQty');
var outMsg  = document.getElementById('outMsg');

function refreshOutSelector() {
  var inv = getInventory();
  var names = Object.keys(inv).sort();
  var sel = outName;
  sel.innerHTML = '<option value="">-- 请选择 --</option>';
  names.forEach(function (n) {
    var opt = document.createElement('option');
    opt.value = n;
    opt.textContent = n + '（库存：' + inv[n] + '）';
    sel.appendChild(opt);
  });
}

function doOutbound() {
  var name = outName.value;
  var qty  = parseInt(outQty.value, 10);
  if (!name)           { showMsg(outMsg, '请选择物资', 'error'); return; }
  if (isNaN(qty) || qty < 1 || qty > 9999) { showMsg(outMsg, '数量须为1~9999的正整数', 'error'); return; }

  var inv = getInventory();
  if (!inv[name] || inv[name] < qty) {
    showMsg(outMsg, '库存不足，当前库存：' + (inv[name] || 0), 'error');
    return;
  }

  inv[name] -= qty;
  if (inv[name] === 0) delete inv[name];
  setInventory(inv);

  var logs = getOutLogs();
  logs.push({ name: name, quantity: qty, time: now(), operator: getCurrentUser() });
  setOutLogs(logs);

  showMsg(outMsg, '出库成功：' + name + ' -' + qty, 'success');
  outQty.value = '';
  refreshAll();
}

// ========== 库存查询 ==========
var searchInput  = document.getElementById('searchInput');
var searchResult = document.getElementById('searchResult');

function refreshSearch() {
  doSearch();
}

function doSearch() {
  var keyword = searchInput.value.trim().toLowerCase();
  var inv = getInventory();
  var entries = Object.entries(inv).sort(function (a, b) { return a[0].localeCompare(b[0]); });
  var filtered = keyword ? entries.filter(function (e) { return e[0].toLowerCase().indexOf(keyword) !== -1; }) : entries;

  if (filtered.length === 0) {
    searchResult.innerHTML = '<tr><td colspan="2" class="empty">暂无</td></tr>';
  } else {
    searchResult.innerHTML = filtered.map(function (e) {
      return '<tr><td>' + escHtml(e[0]) + '</td><td>' + e[1] + '</td></tr>';
    }).join('');
  }
}

function escHtml(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ========== 数据统计 ==========
function refreshStats() {
  var inLogs  = getInLogs();
  var outLogs = getOutLogs();
  var inTotal  = 0;
  var outTotal = 0;
  inLogs.forEach(function (l) { if (isCurrentMonth(l.time)) inTotal  += l.quantity; });
  outLogs.forEach(function (l){ if (isCurrentMonth(l.time)) outTotal += l.quantity; });
  document.getElementById('statIn').textContent  = inTotal;
  document.getElementById('statOut').textContent = outTotal;
}

function getCurrentUser() {
  return load('currentUser') || '';
}

// ========== 事件绑定 ==========
document.getElementById('loginBtn').addEventListener('click', tryLogin);
loginPassInput.addEventListener('keydown', function (e) { if (e.key === 'Enter') tryLogin(); });
document.getElementById('logoutBtn').addEventListener('click', doLogout);

document.getElementById('inBtn').addEventListener('click', doInbound);
document.getElementById('outBtn').addEventListener('click', doOutbound);
document.getElementById('searchBtn').addEventListener('click', doSearch);
searchInput.addEventListener('input', doSearch);

// ========== 初始化 ==========
(function init() {
  var user = load('currentUser');
  if (user && ACCOUNTS[user]) {
    showMain(user);
  } else {
    localStorage.removeItem('currentUser');
    loginPage.style.display = 'flex';
  }
})();
</script>
</body>
</html>
